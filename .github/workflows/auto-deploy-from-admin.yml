name: 后台发布自动部署

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - rebuild-search-index
  workflow_dispatch:

concurrency:
  group: auto-deploy-from-admin
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event.client_payload.source == 'admin-posts' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 缓存 Astro/Vite 构建产物
        uses: actions/cache@v4
        with:
          path: |
            dist
            .astro
            node_modules/.vite
          key: astro-build-${{ hashFiles('package-lock.json', 'astro.config.mjs', 'tsconfig.json', 'wrangler.jsonc', 'src/**/*.ts', 'src/**/*.astro', 'src/**/*.mjs', 'public/**/*.js') }}
          restore-keys: |
            astro-build-${{ hashFiles('package-lock.json') }}-
            astro-build-

      - name: 准备 Cloudflare Access Token
        id: cf_token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::add-mask::$CLOUDFLARE_API_TOKEN"
            echo "token=$CLOUDFLARE_API_TOKEN" >> "$GITHUB_OUTPUT"
            echo "auth_mode=api_token" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$CLOUDFLARE_REFRESH_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=缺少可用凭据：请配置 CLOUDFLARE_API_TOKEN 或 CLOUDFLARE_REFRESH_TOKEN" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURL_OUT=$(curl -sS -X POST "https://dash.cloudflare.com/oauth2/token" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "refresh_token=${CLOUDFLARE_REFRESH_TOKEN}" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7" 2>&1) || true
          RESPONSE=$(echo "$CURL_OUT" || echo "")

          if ! echo "$RESPONSE" | node -e 'const data = JSON.parse(process.argv[1]); if (!data.access_token) process.exit(1);' "$RESPONSE"; then
            ERROR_MSG=$(echo "$RESPONSE" | node -e 'try { const d = JSON.parse(process.argv[1]); process.stdout.write(d.error_description || d.error || "未知错误"); } catch { process.stdout.write("非 JSON 响应: " + (process.argv[1] || "").slice(0, 200)); }' "$RESPONSE" 2>/dev/null || echo "无法解析响应")
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=Cloudflare 令牌刷新失败: ${ERROR_MSG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TOKEN_JSON=$(node -e 'const data = JSON.parse(process.argv[1]); if (!data.access_token) { console.error(JSON.stringify(data)); process.exit(1); } process.stdout.write(JSON.stringify({ accessToken: data.access_token, refreshToken: data.refresh_token || "" }));' "$RESPONSE")
          ACCESS_TOKEN=$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write(data.accessToken);' "$TOKEN_JSON")
          NEXT_REFRESH_TOKEN=$(node -e 'const data = JSON.parse(process.argv[1]); process.stdout.write(data.refreshToken);' "$TOKEN_JSON")

          echo "::add-mask::$ACCESS_TOKEN"
          echo "token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "auth_mode=refresh_token" >> "$GITHUB_OUTPUT"
          if [ -n "$NEXT_REFRESH_TOKEN" ]; then
            echo "::add-mask::$NEXT_REFRESH_TOKEN"
            echo "refresh_token=$NEXT_REFRESH_TOKEN" >> "$GITHUB_OUTPUT"
          fi

      - name: 回写 Cloudflare Refresh Token
        if: ${{ steps.cf_token.outputs.auth_mode == 'refresh_token' && steps.cf_token.outputs.refresh_token != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          NEXT_REFRESH_TOKEN: ${{ steps.cf_token.outputs.refresh_token }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "缺少 GitHub Secret: GH_ADMIN_TOKEN"
            exit 1
          fi
          gh secret set CLOUDFLARE_REFRESH_TOKEN --repo "${{ github.repository }}" --body "$NEXT_REFRESH_TOKEN"

      - name: 执行部署
        if: ${{ steps.cf_token.outputs.skip != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.cf_token.outputs.token }}
        run: npm run deploy

      - name: 输出跳过原因
        if: ${{ steps.cf_token.outputs.skip == 'true' }}
        run: |
          echo "本次自动部署已跳过：${{ steps.cf_token.outputs.skip_reason }}"
